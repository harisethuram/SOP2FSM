{% extends "base.html" %}
{% block title %}Create SOP — SOP Builder{% endblock %}
{% block content %}
<div class="create-sop-card">
  <h1>Create SOP</h1>

  <section class="create-form-section">
    <h2>New SOP</h2>
    <form method="post" class="sop-form">
      <input type="hidden" name="action" value="create">
      <label for="sop_id">SOP ID (unique)</label>
      <input type="text" id="sop_id" name="sop_id" required placeholder="e.g. user_access_flow">
      <label for="sop_title">Title / description</label>
      <input type="text" id="sop_title" name="sop_title" placeholder="e.g. User Access Validation Flow">
      <button type="submit" class="btn btn-primary">Create SOP</button>
    </form>
  </section>
</div>
{% endblock %}
